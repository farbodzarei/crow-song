<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- preload the primary (upright) Raleway variable font to cut FOUT/CLS -->
    <link
      rel="preload"
      href="/fonts/Raleway/Raleway-VariableFont_wght.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <!-- viewport-fit=cover lets the layout extend under the notch / home
         indicator so safe-area-inset-* can pad it back precisely -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#2E2633" />
    <meta name="color-scheme" content="dark" />
    <!-- launch chromeless from the home screen, content under a translucent
         status bar (matches the dark hero) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Crow Song" />
    <meta
      name="description"
      content="Crow Song Yoga Therapy — therapeutic Ashtanga for bodies in transition. One-on-one, guided by christine."
    />
    <link rel="canonical" href="https://crowsongyogatherapy.com/" />
    <title>Crow Song — Yoga Therapy</title>

    <!-- Structured data (LocalBusiness). NOTE: telephone is a placeholder until
         christine confirms; no street address by choice (one-on-one practice). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Crow Song Yoga Therapy",
        "alternateName": "Crow Song",
        "description": "Therapeutic Ashtanga yoga therapy for bodies in transition — one-on-one sessions, courses, and membership, guided by christine white in Vancouver.",
        "url": "https://crowsongyogatherapy.com/",
        "image": "https://crowsongyogatherapy.com/og.png",
        "logo": "https://crowsongyogatherapy.com/icon-512.png",
        "email": "hello@crowsongyogatherapy.com",
        "telephone": "+1-604-555-0123",
        "priceRange": "$$",
        "areaServed": { "@type": "City", "name": "Vancouver" },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Vancouver",
          "addressRegion": "BC",
          "addressCountry": "CA"
        },
        "founder": {
          "@type": "Person",
          "name": "christine white",
          "jobTitle": "Ashtanga Yoga Therapist"
        },
        "knowsAbout": ["Ashtanga yoga", "Yoga therapy", "Yoga Chikitsa", "Mysore"],
        "makesOffer": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "One-on-one yoga therapy session" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Online courses & membership" } }
        ]
      }
    </script>

    <!-- Open Graph / social share -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Crow Song Yoga Therapy" />
    <meta property="og:title" content="Crow Song — Yoga Therapy" />
    <meta
      property="og:description"
      content="Therapeutic Ashtanga for bodies in transition. One-on-one with christine, Vancouver."
    />
    <meta property="og:url" content="https://crowsongyogatherapy.com/" />
    <meta property="og:image" content="https://crowsongyogatherapy.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Crow Song Yoga Therapy" />
    <meta property="og:locale" content="en_CA" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Crow Song — Yoga Therapy" />
    <meta
      name="twitter:description"
      content="Therapeutic Ashtanga for bodies in transition. One-on-one with christine, Vancouver."
    />
    <meta name="twitter:image" content="https://crowsongyogatherapy.com/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
